<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบถามข้อมูลก่อสร้าง</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --border:    #2a2d3a;
    --accent:    #f59e0b;
    --accent2:   #3b82f6;
    --text:      #e8eaf0;
    --muted:     #6b7280;
    --user-bg:   #1e3a5f;
    --bot-bg:    #1e2330;
    --success:   #10b981;
    --danger:    #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
  }

  /* Layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 8px;
    flex-shrink: 0;
  }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
    margin-top: 8px;
  }
  .quick-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .quick-btn:hover {
    background: var(--border);
    border-color: var(--accent);
    color: var(--accent);
  }
  .config-section {
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .config-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 8px;
  }
  .config-row label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .config-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    width: 100%;
    outline: none;
  }
  .config-row input:focus { border-color: var(--accent); }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .welcome h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }
  .welcome p { font-size: 15px; line-height: 1.6; }

  /* Message bubbles */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .avatar.bot { background: var(--accent); color: #000; }
  .avatar.user { background: var(--accent2); }

  .bubble {
    max-width: 70%;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.65;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border-top-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* SQL badge */
  .sql-badge {
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-all;
  }
  .sql-label {
    font-size: 10px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  /* Typing indicator */
  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 16px 18px;
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input bar */
  .input-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 4px 4px 4px 16px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    padding: 10px 0;
    max-height: 120px;
    min-height: 44px;
  }
  textarea::placeholder { color: var(--muted); }
  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #000;
    font-size: 18px;
    transition: all 0.15s;
    flex-shrink: 0;
    margin: 4px;
  }
  .send-btn:hover { background: #fbbf24; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Usage bar */
  .usage-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .usage-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s;
  }
  .usage-text {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏗️</div>
    ระบบวิเคราะห์ข้อมูลก่อสร้าง
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <span>เชื่อมต่อแล้ว</span>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-label">คำถามแนะนำ</div>

    <button class="quick-btn" onclick="ask('โครงการทั้งหมดของฉันมีอะไรบ้าง')">
      📋 โครงการทั้งหมดมีอะไรบ้าง
    </button>
    <button class="quick-btn" onclick="ask('โครงการไหนกำไรมากที่สุด')">
      💰 โครงการไหนกำไรมากสุด
    </button>
    <button class="quick-btn" onclick="ask('มีค่าแรงค้างจ่ายอยู่เท่าไหร่')">
      ⚠️ ค่าแรงค้างจ่ายเท่าไหร่
    </button>
    <button class="quick-btn" onclick="ask('งวดงานไหนที่ยังไม่ได้รับเงินบ้าง')">
      🔔 งวดงานที่ยังไม่ได้รับเงิน
    </button>
    <button class="quick-btn" onclick="ask('วัสดุที่ซื้อเดือนนี้รวมเท่าไหร่')">
      🧱 ค่าวัสดุเดือนนี้รวมเท่าไหร่
    </button>
    <button class="quick-btn" onclick="ask('สรุปภาพรวมธุรกิจทั้งหมด')">
      📊 สรุปภาพรวมธุรกิจ
    </button>

    <div class="config-section">
      <div class="config-row">
        <label>API URL</label>
        <input id="apiUrl" value="http://localhost:8000" placeholder="http://localhost:8000"/>
      </div>
      <div class="config-row">
        <label>API KEY</label>
        <input id="apiKey" value="test-api-key-001" type="password"/>
      </div>
      <div class="usage-bar">
        <div class="usage-fill" id="usageFill" style="width:0%"></div>
      </div>
      <div class="usage-text" id="usageText">ใช้ไป 0 คำถาม</div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🏗️</div>
        <h2>สวัสดีครับ!</h2>
        <p>ผมช่วยวิเคราะห์ข้อมูลโครงการก่อสร้างของคุณได้<br/>
        ถามได้เลยครับ เช่น "กำไรโครงการบ้านสมชายเท่าไหร่"</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea
          id="input"
          placeholder="ถามข้อมูลโครงการ เช่น กำไรเดือนนี้เท่าไหร่..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
  let history = [];
  let usageCount = 0;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function ask(question) {
    document.getElementById('input').value = question;
    sendMessage();
  }

  function addMessage(role, content, sql = null) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = role === 'user' ? '👤' : '🏗️';
    const avatarClass = role === 'user' ? 'user' : 'bot';

    let sqlHtml = '';
    if (sql) {
      sqlHtml = `
        <div class="sql-badge">
          <div class="sql-label">SQL ที่ใช้</div>
          ${escapeHtml(sql)}
        </div>`;
    }

    div.innerHTML = `
      <div class="avatar ${avatarClass}">${avatar}</div>
      <div class="bubble">${content}${sqlHtml}</div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar bot">🏗️</div>
      <div class="bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatAnswer(text) {
    // bold **text**
    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    // newline
    text = text.replace(/\n/g, '<br/>');
    return text;
  }

  function updateUsage() {
    usageCount++;
    const pct = Math.min(usageCount / 300 * 100, 100);
    document.getElementById('usageFill').style.width = pct + '%';
    document.getElementById('usageText').textContent = `ใช้ไป ${usageCount} คำถาม`;
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const question = input.value.trim();
    if (!question) return;

    const apiUrl = document.getElementById('apiUrl').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();

    // แสดงคำถามของ user
    addMessage('user', escapeHtml(question));
    history.push({ role: 'user', content: question });

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(`${apiUrl}/api/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
        },
        body: JSON.stringify({ question, history: history.slice(0, -1) }),
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        addMessage('bot', `❌ ${err.detail || 'เกิดข้อผิดพลาด กรุณาลองใหม่'}`);
        return;
      }

      const data = await res.json();
      addMessage('bot', formatAnswer(data.answer), data.sql_used);
      history.push({ role: 'assistant', content: data.answer });

      // เก็บ history แค่ 10 รอบล่าสุด
      if (history.length > 20) history = history.slice(-20);

      updateUsage();

    } catch (err) {
      removeTyping();
      addMessage('bot', `❌ เชื่อมต่อ server ไม่ได้ กรุณาตรวจสอบว่า server กำลังรันอยู่ที่ ${apiUrl}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
